<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专业驾驶模拟器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            color: #fff;
            touch-action: manipulation;
        }
        .game-wrapper {
            max-width: 420px;
            margin: 0 auto;
            padding: 20px;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.6);
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 15px;
            backdrop-filter: blur(10px);
        }
        .speed-gauge {
            font-size: 24px;
            font-weight: bold;
            color: #00ff88;
        }
        .speed-label {
            font-size: 12px;
            color: #aaa;
            margin-left: 4px;
        }
        .game-status {
            font-size: 14px;
            color: #ffdd57;
        }
        #gameCanvas {
            width: 100%;
            height: 520px;
            background: #2d3748;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .control-panel {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .control-row {
            display: flex;
            gap: 15px;
        }
        .control-btn {
            width: 75px;
            height: 75px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(145deg, #3b82f6, #2563eb);
            color: white;
            font-size: 16px;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
            transition: all 0.15s ease;
            cursor: pointer;
            user-select: none;
        }
        .control-btn:active {
            transform: scale(0.92);
            box-shadow: 0 2px 6px rgba(59, 130, 246, 0.6);
            background: linear-gradient(145deg, #2563eb, #1d4ed8);
        }
        .control-btn.speed-up {
            background: linear-gradient(145deg, #10b981, #059669);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
        }
        .control-btn.speed-down {
            background: linear-gradient(145deg, #ef4444, #dc2626);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="status-bar">
            <div>
                <span class="speed-gauge" id="speedDisplay">0</span>
                <span class="speed-label">km/h</span>
            </div>
            <div class="game-status" id="gameStatus">就绪：点击加速开始驾驶</div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div class="control-panel">
            <button class="control-btn speed-up" id="btnSpeedUp">加速</button>
            <div class="control-row">
                <button class="control-btn" id="btnLeft">左</button>
                <button class="control-btn" id="btnForward">前</button>
                <button class="control-btn" id="btnRight">右</button>
            </div>
            <button class="control-btn speed-down" id="btnSpeedDown">减速</button>
        </div>
    </div>

    <script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const speedDisplay = document.getElementById('speedDisplay');
        const gameStatus = document.getElementById('gameStatus');

        canvas.width = 300;
        canvas.height = 520;

        const game = {
            car: { x: 130, y: 420, width: 35, height: 55, speed: 0, maxSpeed: 100 },
            otherCar: { x: 130, y: -60, width: 35, height: 55, speed: 6 },
            road: { laneWidth: 100, centerX: 150 },
            isCrash: false,
            isSpeeding: false,
            isOutOfLane: false,
            shake: 0,
            loop: null
        };

        function drawRoad() {
            ctx.fillStyle = '#4a4a4a';
            ctx.fillRect(50, 0, 200, canvas.height);
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 3;
            ctx.setLineDash([20, 20]);
            ctx.beginPath();
            ctx.moveTo(game.road.centerX, 0);
            ctx.lineTo(game.road.centerX, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function drawCar(x, y, color, isPlayer = false) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, game.car.width, game.car.height);
            ctx.fillStyle = '#fff';
            ctx.fillRect(x + 5, y + 8, game.car.width - 10, 18);
            ctx.fillRect(x + 5, y + 32, game.car.width - 10, 12);
            if (isPlayer) {
                ctx.fillStyle = '#ff3333';
                ctx.fillRect(x + 12, y - 8, 11, 8);
            }
        }

        function updateOtherCar() {
            game.otherCar.y += game.otherCar.speed + (game.car.speed / 15);
            if (game.otherCar.y > canvas.height) {
                game.otherCar.y = -60;
                game.otherCar.x = 70 + Math.random() * 120;
            }
        }

        function checkCollisions() {
            const c = game.car, oc = game.otherCar;
            const crash = c.x < oc.x + oc.width && c.x + c.width > oc.x && c.y < oc.y + oc.height && c.y + c.height > oc.y;
            if (crash) {
                game.isCrash = true;
                game.shake = 15;
                triggerAccident("追尾", "未保持安全车距，与前方车辆发生追尾碰撞");
            }

            const overSpeed = c.speed > 80;
            if (overSpeed && !game.isSpeeding) {
                game.isSpeeding = true;
                triggerAccident("超速", "当前速度" + c.speed + "km/h，超出道路限速80km/h");
            }

            const outOfLane = c.x < 70 || c.x + c.width > 230;
            if (outOfLane && !game.isOutOfLane) {
                game.isOutOfLane = true;
                triggerAccident("越线", "车辆偏离规定车道行驶，存在安全隐患");
            }
        }

        function applyShake() {
            if (game.shake > 0) {
                const dx = (Math.random() - 0.5) * game.shake;
                const dy = (Math.random() - 0.5) * game.shake;
                ctx.translate(dx, dy);
                game.shake *= 0.9;
                if (game.shake < 0.5) game.shake = 0;
            }
        }

        function gameLoop() {
            if (game.isCrash) return;
            ctx.save();
            applyShake();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawRoad();
            drawCar(game.car.x, game.car.y, '#e53e3e', true);
            drawCar(game.otherCar.x, game.otherCar.y, '#3b82f6');
            ctx.restore();
            updateOtherCar();
            checkCollisions();
            speedDisplay.textContent = Math.round(game.car.speed);
            gameStatus.textContent = game.car.speed === 0 ? "就绪：点击加速开始驾驶" : "行驶中";
            game.loop = requestAnimationFrame(gameLoop);
        }

        document.getElementById('btnSpeedUp').addEventListener('pointerdown', () => {
            if (game.isCrash) return;
            game.car.speed = Math.min(game.car.speed + 8, game.car.maxSpeed);
        });
        document.getElementById('btnSpeedDown').addEventListener('pointerdown', () => {
            if (game.isCrash) return;
            game.car.speed = Math.max(game.car.speed - 12, 0);
        });
        document.getElementById('btnLeft').addEventListener('pointerdown', () => {
            if (game.isCrash || game.car.speed === 0) return;
            game.car.x = Math.max(50, game.car.x - 12 - (game.car.speed / 20));
        });
        document.getElementById('btnRight').addEventListener('pointerdown', () => {
            if (game.isCrash || game.car.speed === 0) return;
            game.car.x = Math.min(215, game.car.x + 12 + (game.car.speed / 20));
        });
        document.getElementById('btnForward').addEventListener('pointerdown', () => {
            if (game.isCrash || game.car.speed === 0) return;
            game.car.y = Math.max(10, game.car.y - 8 * (game.car.speed / 30));
        });

        function triggerAccident(type, desc) {
            cancelAnimationFrame(game.loop);
            gameStatus.textContent = `事故：${type}！`;
            gameStatus.style.color = '#ff4444';
            if (navigator.vibrate) navigator.vibrate(200);
            setTimeout(() => {
                alert(`⚠️ 发生${type}事故！\n原因：${desc}`);
                if (typeof wx !== "undefined") {
                    wx.miniProgram.postMessage({ data: { accidentType: type, accidentDesc: desc } });
                    wx.miniProgram.navigateBack({ delta: 1 });
                }
            }, 500);
        }

        window.onload = () => {
            gameLoop();
        };
    </script>
</body>
</html>
