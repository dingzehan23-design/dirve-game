<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D超写实驾驶模拟器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            color: #fff;
            touch-action: manipulation;
            overflow: hidden;
            height: 100vh;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
        }
        #gameCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        .ui-hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }
        .hud-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
        }
        .hud-speed {
            font-size: 48px;
            font-weight: bold;
            color: #00ff9d;
            text-shadow: 0 0 10px rgba(0,255,157,0.5);
        }
        .hud-unit {
            font-size: 18px;
            color: #ccc;
            margin-left: 5px;
        }
        .hud-status {
            font-size: 18px;
            color: #ffdd57;
        }
        .hud-bottom {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
            pointer-events: all;
        }
        .btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.5);
            color: white;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.15s ease;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active {
            transform: scale(0.95);
            background: rgba(0,0,0,0.8);
            border-color: rgba(255,255,255,0.6);
        }
        .btn-accel {
            background: linear-gradient(145deg, rgba(16,185,129,0.5), rgba(5,150,105,0.8));
        }
        .btn-brake {
            background: linear-gradient(145deg, rgba(239,68,68,0.5), rgba(220,38,38,0.8));
        }
        .btn-steer {
            width: 70px;
            height: 70px;
            font-size: 30px;
        }
        .steer-group {
            display: flex;
            gap: 20px;
        }
        .action-group {
            display: flex;
            gap: 20px;
        }
        /* 事故提示层（不阻塞消息） */
        .crash-tip {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 30px;
            border-radius: 10px;
            z-index: 200;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .crash-tip.show {
            opacity: 1;
        }
        .crash-tip-title {
            font-size: 24px;
            color: #e53935;
            margin-bottom: 10px;
            text-align: center;
        }
        .crash-tip-desc {
            font-size: 16px;
            color: #fff;
            text-align: center;
            margin-bottom: 10px;
        }
        .crash-tip-hint {
            font-size: 14px;
            color: #ccc;
            text-align: center;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div class="ui-hud">
        <div class="hud-top">
            <div>
                <span class="hud-speed" id="speedDisplay">0</span>
                <span class="hud-unit">KM/H</span>
            </div>
            <div class="hud-status" id="statusDisplay">就绪 - 点击油门开始驾驶</div>
        </div>
        <div class="hud-bottom">
            <div class="steer-group">
                <div class="btn btn-steer" id="btnLeft">←</div>
                <div class="btn btn-steer" id="btnRight">→</div>
            </div>
            <div class="action-group">
                <div class="btn btn-brake" id="btnBrake">刹车</div>
                <div class="btn btn-accel" id="btnAccel">油门</div>
            </div>
        </div>
    </div>

    <!-- 事故提示层（替代alert，不阻塞消息） -->
    <div class="crash-tip" id="crashTip">
        <div class="crash-tip-title" id="crashTipTitle"></div>
        <div class="crash-tip-desc" id="crashTipDesc"></div>
        <div class="crash-tip-hint">正在跳转定责结果...</div>
    </div>

    <!-- Three.js 核心库 -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <!-- 微信小程序通信 -->
    <script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>

    <script>
        // ===================== 核心3D引擎初始化 =====================
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x87ceeb, 50, 200);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 15); // 相机后移，避免初始视角遮挡
        
        const renderer = new THREE.WebGLRenderer({
            canvas: document.getElementById('gameCanvas'),
            antialias: true,
            alpha: true
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.outputColorSpace = THREE.SRGBColorSpace;

        // ===================== 光照系统 =====================
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(50, 80, 30);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 500;
        dirLight.shadow.camera.left = -100;
        dirLight.shadow.camera.right = 100;
        dirLight.shadow.camera.top = 100;
        dirLight.shadow.camera.bottom = -100;
        scene.add(dirLight);

        // ===================== 场景构建 =====================
        // 地面
        const groundGeometry = new THREE.PlaneGeometry(400, 400);
        const groundMaterial = new THREE.MeshStandardMaterial({
            color: 0x696969,
            roughness: 0.9,
            metalness: 0.1
        });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // 十字路口道路
        function createRoad(x, z, width, length, color = 0x2c2c2c) {
            const roadGeometry = new THREE.BoxGeometry(width, 0.1, length);
            const roadMaterial = new THREE.MeshStandardMaterial({
                color: color,
                roughness: 0.8,
                metalness: 0.2
            });
            const road = new THREE.Mesh(roadGeometry, roadMaterial);
            road.position.set(x, 0.05, z);
            road.receiveShadow = true;
            scene.add(road);
            return road;
        }
        createRoad(0, 0, 18, 200);
        createRoad(0, 0, 200, 18);

        // 车道线
        function createLaneMarkers() {
            const markerMaterial = new THREE.MeshStandardMaterial({
                color: 0xffffff,
                roughness: 0.1,
                metalness: 0.9
            });
            
            for (let i = -90; i <= 90; i += 8) {
                const leftMarker = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.02, 4), markerMaterial);
                leftMarker.position.set(-6, 0.06, i);
                leftMarker.castShadow = true;
                scene.add(leftMarker);

                const rightMarker = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.02, 4), markerMaterial);
                rightMarker.position.set(6, 0.06, i);
                rightMarker.castShadow = true;
                scene.add(rightMarker);
            }

            for (let i = -90; i <= 90; i += 8) {
                const topMarker = new THREE.Mesh(new THREE.BoxGeometry(4, 0.02, 0.2), markerMaterial);
                topMarker.position.set(i, 0.06, -6);
                topMarker.castShadow = true;
                scene.add(topMarker);

                const bottomMarker = new THREE.Mesh(new THREE.BoxGeometry(4, 0.02, 0.2), markerMaterial);
                bottomMarker.position.set(i, 0.06, 6);
                bottomMarker.castShadow = true;
                scene.add(bottomMarker);
            }

            // 中心双黄线
            const centerLine = new THREE.Mesh(
                new THREE.BoxGeometry(0.4, 0.02, 200),
                new THREE.MeshStandardMaterial({ color: 0xffff00 })
            );
            centerLine.position.set(0, 0.06, 0);
            scene.add(centerLine);

            const centerLine2 = new THREE.Mesh(
                new THREE.BoxGeometry(200, 0.02, 0.4),
                new THREE.MeshStandardMaterial({ color: 0xffff00 })
            );
            centerLine2.position.set(0, 0.06, 0);
            scene.add(centerLine2);
        }
        createLaneMarkers();

        // 护栏
        function createGuardRail(x, z, rotation = 0) {
            const railGeometry = new THREE.BoxGeometry(0.3, 0.8, 100);
            const railMaterial = new THREE.MeshStandardMaterial({ color: 0x444444 });
            const rail = new THREE.Mesh(railGeometry, railMaterial);
            rail.position.set(x, 0.45, z);
            rail.rotation.y = rotation;
            rail.castShadow = true;
            scene.add(rail);
            return rail;
        }
        createGuardRail(-12, 0);
        createGuardRail(12, 0);
        createGuardRail(0, -12, Math.PI / 2);
        createGuardRail(0, 12, Math.PI / 2);

        // ===================== 3D车辆系统 =====================
        function createCar(color = 0xff3333, x = 0, z = 0) {
            const carGroup = new THREE.Group();
            
            // 车身
            const bodyGeometry = new THREE.BoxGeometry(2.2, 1, 4.5);
            const bodyMaterial = new THREE.MeshStandardMaterial({
                color: color,
                roughness: 0.3,
                metalness: 0.7
            });
            const carBody = new THREE.Mesh(bodyGeometry, bodyMaterial);
            carBody.position.y = 0.5;
            carBody.castShadow = true;
            carGroup.add(carBody);

            // 车顶
            const roofGeometry = new THREE.BoxGeometry(1.8, 0.8, 2);
            const roofMaterial = new THREE.MeshStandardMaterial({
                color: color,
                roughness: 0.2,
                metalness: 0.8
            });
            const roof = new THREE.Mesh(roofGeometry, roofMaterial);
            roof.position.set(0, 1.3, -0.5);
            carGroup.add(roof);

            // 车窗
            const windowGeometry = new THREE.BoxGeometry(1.7, 0.7, 1.9);
            const windowMaterial = new THREE.MeshStandardMaterial({
                color: 0x111111,
                roughness: 0.1,
                metalness: 0.9,
                transparent: true,
                opacity: 0.7
            });
            const window = new THREE.Mesh(windowGeometry, windowMaterial);
            window.position.set(0, 1.35, -0.5);
            carGroup.add(window);

            // 车轮
            function createWheel(x, z) {
                const wheelGroup = new THREE.Group();
                
                // 轮胎
                const tireGeometry = new THREE.CylinderGeometry(0.4, 0.4, 0.3, 16);
                const tireMaterial = new THREE.MeshStandardMaterial({
                    color: 0x111111,
                    roughness: 0.1,
                    metalness: 0.9
                });
                const tire = new THREE.Mesh(tireGeometry, tireMaterial);
                tire.rotation.z = Math.PI / 2;
                wheelGroup.add(tire);

                // 轮毂
                const rimGeometry = new THREE.CylinderGeometry(0.3, 0.3, 0.25, 16);
                const rimMaterial = new THREE.MeshStandardMaterial({
                    color: 0x999999,
                    roughness: 0.2,
                    metalness: 0.9
                });
                const rim = new THREE.Mesh(rimGeometry, rimMaterial);
                rim.rotation.z = Math.PI / 2;
                wheelGroup.add(rim);

                wheelGroup.position.set(x, 0.4, z);
                carGroup.add(wheelGroup);
            }

            // 四个车轮
            createWheel(1.2, 1.8);  // 右前
            createWheel(-1.2, 1.8); // 左前
            createWheel(1.2, -1.8); // 右后
            createWheel(-1.2, -1.8);// 左后

            // 车牌
            const plateGeometry = new THREE.PlaneGeometry(1.2, 0.6);
            const plateMaterial = new THREE.MeshBasicMaterial({
                color: 0xffffff,
                side: THREE.DoubleSide
            });
            const plate = new THREE.Mesh(plateGeometry, plateMaterial);
            plate.position.set(0, 0.6, 2.3);
            plate.rotation.y = Math.PI;
            carGroup.add(plate);

            // 设置初始位置
            carGroup.position.set(x, 0, z);
            carGroup.castShadow = true;
            
            scene.add(carGroup);
            return carGroup;
        }

        // 🔥 玩家初始位置（绝对安全区）
        const playerCar = createCar(0xff3333, 0, 10);
        
        // 🔥 4号NPC移到更远位置，避免初始碰撞
        const npcCars = [
            createCar(0x3366ff, -8, -60),   // 1号
            createCar(0x33cc33, 8, -70),    // 2号
            createCar(0xff9900, -70, -8),   // 3号
            createCar(0x9933ff, 60, 50)     // 4号（z从30→50，彻底远离玩家）
        ];

        // 狮子障碍物（十字路口中央）
        function createLion() {
            const lionGroup = new THREE.Group();
            
            // 身体
            const bodyGeometry = new THREE.SphereGeometry(1.2, 16, 16);
            const bodyMaterial = new THREE.MeshStandardMaterial({
                color: 0xdaa520,
                roughness: 0.8,
                metalness: 0.1
            });
            const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
            body.position.set(0, 1.2, 0);
            lionGroup.add(body);

            // 头部
            const headGeometry = new THREE.SphereGeometry(0.8, 16, 16);
            const head = new THREE.Mesh(headGeometry, bodyMaterial);
            head.position.set(0.8, 1.5, 0);
            lionGroup.add(head);

            // 腿
            function createLeg(x, z) {
                const legGeometry = new THREE.CylinderGeometry(0.3, 0.3, 1.2, 8);
                const leg = new THREE.Mesh(legGeometry, bodyMaterial);
                leg.position.set(x, 0.6, z);
                lionGroup.add(leg);
            }
            createLeg(0.6, 0.6);
            createLeg(-0.6, 0.6);
            createLeg(0.6, -0.6);
            createLeg(-0.6, -0.6);

            lionGroup.position.set(0, 0, 0);
            scene.add(lionGroup);
            return lionGroup;
        }
        const lion = createLion();

        // ===================== 游戏逻辑 =====================
        const gameState = {
            speed: 0,
            maxSpeed: 80,
            steering: 0,
            steeringSpeed: 0.08,
            acceleration: 5,
            deceleration: 8,
            friction: 0.8,
            isCrashed: false,
            crashType: "",
            crashDesc: "",
            npcSpeeds: [2, 1.8, 1.5, 2.2],
            npcDirections: [0, 0, Math.PI/2, -Math.PI/2]
        };

        // 更新NPC车辆
        function updateNPCs() {
            npcCars.forEach((car, index) => {
                const speed = gameState.npcSpeeds[index];
                const dir = gameState.npcDirections[index];
                
                car.position.x += Math.sin(dir) * speed * 0.1; // 减速NPC移动，避免快速撞玩家
                car.position.z += Math.cos(dir) * speed * 0.1;
                
                // 边界重置
                if (car.position.z > 100) car.position.z = -90;
                if (car.position.z < -100) car.position.z = 90;
                if (car.position.x > 100) car.position.x = -90;
                if (car.position.x < -100) car.position.x = 90;
                
                car.rotation.y = dir;
            });
        }

        // 碰撞检测
        function checkCollisions() {
            if (gameState.isCrashed) return;

            const playerPos = playerCar.position;
            
            // 碰撞NPC
            npcCars.forEach((npcCar, index) => {
                const npcPos = npcCar.position;
                const distance = Math.hypot(
                    playerPos.x - npcPos.x,
                    playerPos.z - npcPos.z
                );

                if (distance < 5) { // 碰撞距离从4→5，更宽松
                    gameState.isCrashed = true;
                    gameState.crashType = "车辆碰撞";
                    gameState.crashDesc = `与${index+1}号NPC车辆发生${index%2===0?'正面':'侧面'}碰撞，未保持安全车距`;
                    triggerCrash();
                }
            });

            // 碰撞狮子
            const lionPos = lion.position;
            const lionDistance = Math.hypot(
                playerPos.x - lionPos.x,
                playerPos.z - lionPos.z
            );
            if (lionDistance < 3) {
                gameState.isCrashed = true;
                gameState.crashType = "动物碰撞";
                gameState.crashDesc = "在十字路口未注意观察，撞到横穿道路的狮子";
                triggerCrash();
            }

            // 护栏碰撞
            if (Math.abs(playerPos.x) > 15 || Math.abs(playerPos.z) > 15) {
                gameState.isCrashed = true;
                gameState.crashType = "护栏碰撞";
                gameState.crashDesc = "车辆驶出道路，碰撞路边护栏，违规驾驶";
                triggerCrash();
            }

            // 超速
            if (gameState.speed > 60 && !gameState.isCrashed) {
                gameState.isCrashed = true;
                gameState.crashType = "超速违章";
                gameState.crashDesc = `当前车速${Math.round(gameState.speed)}km/h，超过十字路口限速60km/h`;
                triggerCrash();
            }
        }

        // 🔥 终极修复：直接调用小程序跳转，抛弃postMessage
        function triggerCrash() {
            document.getElementById('statusDisplay').textContent = `事故：${gameState.crashType}`;
            
            // 震动反馈
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);

            // 显示事故提示层
            const crashTip = document.getElementById('crashTip');
            const crashTipTitle = document.getElementById('crashTipTitle');
            const crashTipDesc = document.getElementById('crashTipDesc');
            crashTipTitle.textContent = `⚠️ ${gameState.crashType}`;
            crashTipDesc.textContent = gameState.crashDesc;
            crashTip.classList.add('show');

            console.log("【H5】触发事故，准备跳转小程序结果页：", {
                accidentType: gameState.crashType,
                accidentDesc: gameState.crashDesc
            });

            // 🔥 核心：直接调用小程序的navigateTo，传参并跳转
            if (typeof wx !== "undefined") {
                // 编码参数，避免特殊字符问题
                const type = encodeURIComponent(gameState.crashType);
                const desc = encodeURIComponent(gameState.crashDesc);
                
                // 调用小程序跳转接口
                wx.miniProgram.navigateTo({
                    url: `/pages/result/result?accidentType=${type}&accidentDesc=${desc}`,
                    success: () => {
                        console.log("✅ 跳转小程序结果页成功");
                    },
                    fail: (err) => {
                        console.error("❌ 跳转失败：", err);
                        // 兜底：提示用户手动返回
                        crashTip.querySelector('.crash-tip-hint').textContent = "跳转失败，请手动返回";
                    }
                });
            } else {
                console.log("【H5】不在小程序环境，跳过跳转");
            }
        }

        // 🔥 修复按钮无响应：兼容移动端touch事件
        let isAccelPressed = false;
        let isBrakePressed = false;
        let isLeftPressed = false;
        let isRightPressed = false;

        // 绑定触摸+点击事件
        function bindButtonEvents() {
            // 油门
            const accelBtn = document.getElementById('btnAccel');
            accelBtn.addEventListener('touchstart', () => isAccelPressed = true);
            accelBtn.addEventListener('touchend', () => isAccelPressed = false);
            accelBtn.addEventListener('mousedown', () => isAccelPressed = true);
            accelBtn.addEventListener('mouseup', () => isAccelPressed = false);

            // 刹车
            const brakeBtn = document.getElementById('btnBrake');
            brakeBtn.addEventListener('touchstart', () => isBrakePressed = true);
            brakeBtn.addEventListener('touchend', () => isBrakePressed = false);
            brakeBtn.addEventListener('mousedown', () => isBrakePressed = true);
            brakeBtn.addEventListener('mouseup', () => isBrakePressed = false);

            // 左转向
            const leftBtn = document.getElementById('btnLeft');
            leftBtn.addEventListener('touchstart', () => isLeftPressed = true);
            leftBtn.addEventListener('touchend', () => isLeftPressed = false);
            leftBtn.addEventListener('mousedown', () => isLeftPressed = true);
            leftBtn.addEventListener('mouseup', () => isLeftPressed = false);

            // 右转向
            const rightBtn = document.getElementById('btnRight');
            rightBtn.addEventListener('touchstart', () => isRightPressed = true);
            rightBtn.addEventListener('touchend', () => isRightPressed = false);
            rightBtn.addEventListener('mousedown', () => isRightPressed = true);
            rightBtn.addEventListener('mouseup', () => isRightPressed = false);
        }

        // 游戏主循环
        function gameLoop() {
            if (!gameState.isCrashed) {
                // 加速/减速
                if (isAccelPressed) {
                    gameState.speed = Math.min(
                        gameState.speed + gameState.acceleration * 0.02, // 加速倍率提高，更易操作
                        gameState.maxSpeed
                    );
                } else if (isBrakePressed) {
                    gameState.speed = Math.max(
                        gameState.speed - gameState.deceleration * 0.02,
                        0
                    );
                } else {
                    gameState.speed *= gameState.friction;
                }

                // 转向
                if (isLeftPressed) {
                    gameState.steering -= gameState.steeringSpeed * 0.5; // 转向减速，更顺滑
                    gameState.steering = Math.max(gameState.steering, -Math.PI/4);
                } else if (isRightPressed) {
                    gameState.steering += gameState.steeringSpeed * 0.5;
                    gameState.steering = Math.min(gameState.steering, Math.PI/4);
                } else {
                    gameState.steering *= 0.95; // 转向回正更慢，更易控制
                }

                // 更新玩家车辆
                playerCar.rotation.y = gameState.steering;
                playerCar.position.x += Math.sin(gameState.steering) * gameState.speed * 0.1;
                playerCar.position.z -= Math.cos(gameState.steering) * gameState.speed * 0.1;

                // 更新NPC和碰撞检测
                updateNPCs();
                checkCollisions();

                // 更新UI
                document.getElementById('speedDisplay').textContent = Math.round(gameState.speed);
                if (!isAccelPressed && !isBrakePressed && gameState.speed > 0) {
                    document.getElementById('statusDisplay').textContent = "行驶中 - 松开油门自动减速";
                } else if (isAccelPressed) {
                    document.getElementById('statusDisplay').textContent = "加速中 - 注意观察路况";
                } else if (isBrakePressed) {
                    document.getElementById('statusDisplay').textContent = "减速中 - 安全驾驶";
                }
            }

            // 相机跟随优化（更稳定）
            const cameraOffset = new THREE.Vector3(
                -Math.sin(playerCar.rotation.y) * 8,
                5,
                Math.cos(playerCar.rotation.y) * 8
            );
            camera.position.x = playerCar.position.x + cameraOffset.x;
            camera.position.y = playerCar.position.y + cameraOffset.y;
            camera.position.z = playerCar.position.z + cameraOffset.z;
            camera.lookAt(playerCar.position.x, playerCar.position.y + 1, playerCar.position.z);

            // 渲染场景
            renderer.render(scene, camera);
            requestAnimationFrame(gameLoop);
        }

        // 窗口自适应
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 初始化
        bindButtonEvents(); // 先绑定按钮事件
        gameLoop(); // 启动游戏
    </script>
</body>
</html>
